<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precision SCADA - PLC Control</title>
    <base href="/" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-fixed-variant": "#005236",
                      "on-primary-container": "#f8f7ff",
                      "surface-tint": "#0054d6",
                      "on-surface": "#0d1c2e",
                      "on-primary-fixed": "#001849",
                      "tertiary": "#b21320",
                      "on-surface-variant": "#424656",
                      "on-background": "#0d1c2e",
                      "on-tertiary-fixed-variant": "#930013",
                      "inverse-on-surface": "#eaf1ff",
                      "on-primary-fixed-variant": "#003fa4",
                      "primary-fixed": "#dae1ff",
                      "on-secondary-fixed": "#002113",
                      "inverse-primary": "#b3c5ff",
                      "secondary": "#006c49",
                      "on-primary": "#ffffff",
                      "secondary-fixed": "#6ffbbe",
                      "background": "#f8f9ff",
                      "tertiary-container": "#d63135",
                      "error-container": "#ffdad6",
                      "surface-bright": "#f8f9ff",
                      "outline": "#727687",
                      "surface-dim": "#ccdbf3",
                      "primary-fixed-dim": "#b3c5ff",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "tertiary-fixed": "#ffdad7",
                      "on-tertiary-fixed": "#410004",
                      "on-error": "#ffffff",
                      "surface-container-high": "#dce9ff",
                      "on-secondary-container": "#00714d",
                      "inverse-surface": "#233144",
                      "surface-container-lowest": "#ffffff",
                      "surface-variant": "#d5e3fc",
                      "surface-container-highest": "#d5e3fc",
                      "surface-container-low": "#eff4ff",
                      "primary-container": "#0066ff",
                      "secondary-container": "#6cf8bb",
                      "error": "#ba1a1a",

                      "on-error-container": "#93000a",
                      "surface-container": "#e6eeff",
                      "outline-variant": "#c2c6d8",
                      "on-tertiary": "#ffffff",
                      "primary": "#0050cb",
                      "secondary-fixed-dim": "#4edea3",
                      "on-tertiary-container": "#fff6f5"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk"],
                      "body": ["Inter"],
                      "label": ["Space Grotesk"]
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-layering {
            transition: background-color 0.2s ease;
        }
        .glass-panel {
            background: rgba(213, 227, 252, 0.7);
            backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen">
    <div id="app">Loading...</div>

    <div id="blazor-error-ui" class="hidden absolute bottom-0 left-0 right-0 bg-red-100 text-red-900 border-t-2 border-red-500 max-h-48 overflow-y-auto px-5 py-3">
        An unhandled error has occurred.
        <a href="" class="underline text-blue-800">Reload</a>
        <a class="dismiss font-bold no-underline float-right cursor-pointer">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
